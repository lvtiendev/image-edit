services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_IMAGE_SERVER_URL=http://localhost:8000
    volumes:
      - ./webapp:/app
      - /app/node_modules
      - /app/.next
    command: yarn dev
    depends_on:
      - server
