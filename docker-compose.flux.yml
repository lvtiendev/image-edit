services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_TYPE=flux # Using Flux model
      - HF_TOKEN=${HF_TOKEN}
      - DEVICE_MAP=${DEVICE_MAP:-balanced}
      - QUANTIZATION=${QUANTIZATION:-8bit}
      - MAX_MEMORY=${MAX_MEMORY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # Use all available GPUs
              capabilities: [ gpu ]

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_IMAGE_SERVER_URL=http://localhost:8000
    volumes:
      - ./webapp:/app
      - /app/node_modules
      - /app/.next
    command: yarn dev
    depends_on:
      - server
